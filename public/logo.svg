<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="4" y1="4" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F46E5"/>
      <stop offset="0.45" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#D946EF"/>
    </linearGradient>
    <linearGradient id="line" x1="10" y1="32" x2="38" y2="16" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399"/>
      <stop offset="1" stop-color="#FDE68A"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="2" y="2" width="44" height="44" rx="12" fill="url(#bg)"/>
  <!-- Subtle inner glow -->
  <rect x="2" y="2" width="44" height="44" rx="12" fill="white" opacity="0.06"/>
  <!-- Volatility line / trend arrow -->
  <polyline
    points="10,32 18,28 22,34 28,18 34,22 38,14"
    stroke="url(#line)"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
  <!-- Arrow tip -->
  <polyline
    points="34,14 38,14 38,18"
    stroke="#FDE68A"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
  <!-- "Oz" text -->
  <text x="24" y="44" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="7" font-weight="800" fill="rgba(255,255,255,0.85)" letter-spacing="0.5">OzCTA</text>
</svg>
